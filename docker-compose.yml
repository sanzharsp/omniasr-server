services:
  omniasr:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # MODEL_NAME for the build-time preload step. Must be an HF-resolvable
        # model (the custom issai_omini_11langs_new asset is only available at
        # runtime via the mounted fairseq2-assets/). Override with
        # BUILD_MODEL_NAME if you want a different base cached into the image.
        MODEL_NAME: ${BUILD_MODEL_NAME:-omniASR_LLM_1B_v2}
        ZERO_SHOT_MODEL_NAME: ${BUILD_ZERO_SHOT_MODEL_NAME:-}
        ALIGNMENT_MODEL_NAME: ${BUILD_ALIGNMENT_MODEL_NAME:-omniASR_CTC_1B_v2}
    image: omniasr-server:local
    container_name: omniasr-server
    restart: always
    env_file:
      - .env
    environment:
      # Override .env entries that reference host-only paths.
      FAIRSEQ2_USER_ASSET_DIR: /app/fairseq2-assets
      OMNILINGUAL_HOST: 0.0.0.0
    ports:
      - "${OMNILINGUAL_PORT:-8081}:8081"
    volumes:
      # Mount the host models dir at the SAME absolute path so the file://
      # URI in fairseq2-assets/*.yaml resolves both on host and in container.
      - /home/admin2/programmers/omniasr-server/models:/home/admin2/programmers/omniasr-server/models:ro
      - ./fairseq2-assets:/app/fairseq2-assets:ro
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
